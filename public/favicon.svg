<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3CA40"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Navy background -->
  <rect width="100" height="100" rx="18" fill="#1B2B4C"/>
  <!-- Anchor body -->
  <line x1="50" y1="22" x2="50" y2="75" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>
