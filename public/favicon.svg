  <path d="M50 75 Q30 75 30 62" fill="none" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="30" cy="62" r="4" fill="url(#gold)"/>
  <!-- Anchor right arm -->
  <path d="M50 75 Q70 75 70 62" fill="none" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="70" cy="62" r="4" fill="url(#gold)"/>
