  <line x1="30" y1="36" x2="70" y2="36" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Anchor ring -->
  <circle cx="50" cy="18" r="6" fill="none" stroke="url(#gold)" stroke-width="4.5"/>
